version: "3.9"
services:
  trader:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PERSIST_DIR=/app/data
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
