services:
  - type: web
    name: mexc-ml-trader
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    staticPublishPath: frontend
    routes:
      - type: static
        value: /
        source: frontend/index.html
