services:
  - type: web
    name: mexc-ml-trader
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    staticPublishPath: frontend
    routes:
      - type: static
        value: /
        source: frontend/index.html
