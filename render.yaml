services:
  - type: web
    name: mexc-ml-trader
    runtime: python
    pythonVersion: 3.11
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python main.py
    staticPublishPath: frontend
    routes:
      - type: static
        value: /
        source: frontend/index.html
