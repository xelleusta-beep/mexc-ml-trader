services:
  - type: web
    name: mexc-ml-trader
    runtime: python
    pythonVersion: "3.11"
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PERSIST_DIR
        value: /var/data
      # Memory koruma ayarlari
      - key: USE_V3_FEATURES
        value: "false"
      - key: SCANNER_INTERVAL_SEC
        value: "60"
      - key: SCANNER_BATCH_SIZE
        value: "5"
      - key: KLINE_LIMIT
        value: "100"
      - key: RL_PRETRAIN_ITERATIONS
        value: "30"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MAX_OPEN_POSITIONS
        value: "10"
    disk:
      name: trader-data
      mountPath: /var/data
      sizeGB: 1
